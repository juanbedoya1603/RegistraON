server {
    listen 80;
    server_name localhost;

    # --- ESCUDO DE SEGURIDAD: IP WHITELISTING ---
    # Reemplazar con las IPs locales estáticas de los 5 computadores
    allow 192.168.1.10; # Computador 1
    allow 192.168.1.11; # Computador 2
    allow 192.168.1.12; # Computador 3
    allow 192.168.1.13; # Computador 4
    allow 192.168.1.14; # Computador 5
    allow 127.0.0.1;    # Permitir al propio servidor (localhost)
    # Si la red interna es 10.0.0.x, cambia las IPs de arriba.
    deny all; # Bloquear absolutamente todo lo demás
    # --------------------------------------------

    # Servir la aplicación React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy para el Backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
