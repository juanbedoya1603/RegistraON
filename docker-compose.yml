version: '3.8'

services:
  backend:
    build: ./backend
    container_name: registraon_backend
    restart: always
    env_file:
      - ./backend/.env
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: registraon_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
